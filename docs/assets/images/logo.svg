<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" role="img" aria-labelledby="title desc">
  <title id="title">JS Tailors</title>
  <desc id="desc">Modern JS monogram with tailoring needle motif, burgundy and gold.</desc>
  <rect width="240" height="80" rx="18" fill="#7e2b40" />
  <!-- needle loop forming the J and S monogram -->
  <g transform="translate(28,12)">
    <circle cx="28" cy="28" r="24" fill="#f4e9da" />
    <path d="M18 18 C28 6, 46 6, 56 18 C66 30, 46 46, 28 46 C12 46, 4 32, 12 22" fill="#7e2b40" opacity="0.95" />
    <rect x="56" y="14" width="10" height="6" rx="2" fill="#c99b59" transform="rotate(-30 56 14)" />
  </g>
  <text x="110" y="40" fill="#fff" font-family="Inter, 'Segoe UI', sans-serif" font-size="28" font-weight="700">JS</text>
  <text x="110" y="62" fill="#f3dfb9" font-family="Inter, 'Segoe UI', sans-serif" font-size="14">Tailors</text>
</svg>